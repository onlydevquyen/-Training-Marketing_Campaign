<!DOCTYPE html>
<html lang="vi">
<head>
  <link rel="icon" type="image/x-icon" href="https://cafe.net.vn/media/favicon/stores/1/favicon-new.png">
  <meta http-equiv="Content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gia Nhập Chiến Dịch G7 - Trung Nguyên Legend</title>

  <style>
    :root {
      --tn-gold: #b4975a; 
      --tn-black: #1a1a1a;
      --tn-light-gold: rgba(180, 151, 90, 0.25);
    }

    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      -webkit-tap-highlight-color: transparent; /* Tắt highlight xanh khi chạm trên mobile */
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px; /* Giảm padding ngoài trên mobile */
      background: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1)), 
                  url("https://trungnguyenlegend.com/wp-content/uploads/2020/11/2111.jpg") center / cover no-repeat fixed;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: inherit;
      filter: blur(5px);
      z-index: -1;
      transform: scale(1.1);
    }

    .form-wrapper {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.98);
      padding: 35px 25px; /* Tối ưu padding cho mobile */
      position: relative;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      border-radius: 2px;
    }

    .form-wrapper::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 5px;
      background: var(--tn-gold);
    }

    .form-title {
      text-align: center;
      margin-bottom: 25px;
    }

    .form-title h2 {
      margin: 0;
      color: var(--tn-black);
      font-size: 18px; /* Giảm nhẹ size chữ tiêu đề cho mobile */
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-title p {
      margin-top: 8px;
      font-size: 13px;
      color: #555;
      line-height: 1.4;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-group {
      margin-bottom: 16px;
      flex: 1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #444;
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      font-size: 16px; /* Quan trọng: 16px giúp iPhone không bị tự động zoom */
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 0;
      outline: none;
      transition: all 0.2s ease-in-out;
      -webkit-appearance: none; /* Xóa style mặc định của iOS trên select/input */
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--tn-gold);
      box-shadow: 0 0 0 1px var(--tn-gold), 0 4px 10px var(--tn-light-gold);
    }

    textarea {
      min-height: 80px;
    }

    .submit-btn {
      margin-top: 10px;
    }

    .submit-btn input {
      width: 100%;
      padding: 16px;
      background: var(--tn-black);
      border: 1px solid var(--tn-black);
      color: var(--tn-gold);
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s;
    }

    /* RESPONSIVE CHO MOBILE */
    @media (max-width: 600px) {
      .form-row {
        flex-direction: column;
        gap: 0;
      }
      .form-wrapper {
        padding: 25px 20px;
      }
      .form-title h2 {
        font-size: 16px;
      }
      .submit-btn input {
        padding: 14px;
      }
    }
  </style>
</head>

<body>

 <form
    class="form-wrapper"
    action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DBK000005rUrV"
    method="POST"
  >

    <!-- Hidden fields -->
    <input type="hidden" name="oid" value="00DBK000005rUrV">
    <input type="hidden" name="retURL" value="https://trungnguyenecoffee.com/">

    <input id="lead_source" name="lead_source" type="hidden" value="Website">
    <input id="company" name="company" type="hidden" value="Non-company">
    <input id="00NNn00000BWO0W" name="00NNn00000BWO0W" type="hidden" value="701BK00000gPDErYAO"> <!--  UTM Campaign  -->

    <input id="00NNn00000BWO0X" name="00NNn00000BWO0X" type="hidden" value="UTM Content"> <!--  UTM Content  -->
    <input id="00NNn00000BWO0Y" name="00NNn00000BWO0Y" type="hidden" value="UTM Medium"> <!--  UTM Medium  -->
    <input id="00NNn00000BWO0Z" name="00NNn00000BWO0Z" type="hidden" value="UTM Source"> <!--  UTM Source  -->
    <input id="00NNn00000BWO0a" name="00NNn00000BWO0a" type="hidden" value="UTM Term"> <!--  UTM Term  -->


    <div class="form-title">
      <h2>KHÁT VỌNG TOÀN CẦU</h2>
      <p>Cùng Trung Nguyên Legend lan tỏa hương vị cà phê năng lượng toàn cầu.</p>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="last_name">Họ tên *</label>
        <input required id="last_name" name="last_name" maxlength="80" type="text" placeholder="Nguyễn Văn A">
      </div>
      <div class="form-group">
        <label for="phone">Điện thoại *</label>
        <input required id="phone" name="phone" maxlength="40" type="text" placeholder="090x xxx xxx">
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" name="email" maxlength="80" type="text" placeholder="example@gmail.com">
    </div>

    <div class="form-group">
      <label for="00NNn00000BWO0P">Khu vực</label>
        <select required id="00NNn00000BWO0P" name="00NNn00000BWO0P">
        <option value="">-- Chọn khu vực --</option>
        <option value="a08Az00000Ljm3GIAR">Thành phố Hồ Chí Minh</option>
        <option value="a08Az00000Ljm2pIAB">Thành phố Hà Nội</option>
        <option value="a08Az00000Ljm39IAB">Thành phố Đà Nẵng</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="00NNn00000BWO06">Interested Brand</label>
        <select id="00NNn00000BWO06" name="00NNn00000BWO06">
          <option value="">-- Chọn --</option>
          <option value="Trung Nguyen Legend">Trung Nguyen Legend</option>
          <option value="Trung Nguyen E-Coffee">Trung Nguyen E-Coffee</option>
        </select>
      </div>
      <div class="form-group">
        <label for="00NNn00000BWvUg">Franchise Package</label>
        <select id="00NNn00000BWvUg" name="00NNn00000BWvUg">
          <option value="">-- Chọn gói --</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="description">Ghi chú</label>
      <textarea name="description" placeholder="Để lại lời nhắn..."></textarea>
    </div>

    <div class="submit-btn">
      <input type="submit" value="GỬI ĐĂNG KÝ">
    </div>

  </form>

  <script>
    const brandSelect = document.getElementById('00NNn00000BWO0P');
    const packageSelect = document.getElementById('00NNn00000BWO06');

    const optionsMap = {
      "Trung Nguyen Legend": ["Franchising I"],
      "Trung Nguyen E-Coffee": ["Thinh Vuong", "Khoi Nghiep", "Ket noi", "Chuyen doi"],
      "Ca Phe The Gioi Trung Nguyen Legend": []
    };

    brandSelect.addEventListener('change', function () {
      packageSelect.innerHTML = '<option value="">-- Chọn gói --</option>';
      const selectedBrand = this.value;
      const options = optionsMap[selectedBrand] || [];
      options.forEach(function (opt) {
        const optionEl = document.createElement('option');
        optionEl.value = opt;
        optionEl.text = opt;
        packageSelect.add(optionEl);
      });
      packageSelect.disabled = options.length === 0;
    });

    brandSelect.dispatchEvent(new Event('change'));
  </script>

</body>
</html>
